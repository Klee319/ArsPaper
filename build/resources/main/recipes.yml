# ArsPaper Recipes Configuration
# result: "custom:<item_id>" でカスタムアイテムを指定
# result: "MATERIAL_NAME" でバニラアイテムを指定
# type: "shaped" or "shapeless"

recipes:

  # === Spell Books ===

  spell_book_novice:
    type: shaped
    result: "custom:spell_book_novice"
    amount: 1
    shape:
      - " D "
      - "LBL"
      - " R "
    ingredients:
      D: DIAMOND
      L: LAPIS_LAZULI
      B: BOOK
      R: REDSTONE

