# ============================================================
# materials.yml - 中間素材定義
# ============================================================
# 儀式で作成する中間素材アイテムの定義ファイル。
# 各素材はベースマテリアル・表示情報・儀式レシピを持つ。
#
# custom: プレフィックスは本プラグインのカスタムアイテムを参照する。
# "x2" 等の記法はアイテム数量を示す。
# ============================================================

materials:

  # ----------------------------------------------------------
  # ソースジェム - 魔力を帯びた結晶
  # ----------------------------------------------------------
  source_gem:
    base_material: PRISMARINE_SHARD
    custom_model_data: 100011
    display_name: "ソースジェム"
    name_color: "&b"
    lore:
      - "&7魔力を帯びた結晶"
    recipe:
      method: ritual
      core-item: AMETHYST_SHARD
      pedestal-items:
        - "AMETHYST_SHARD x3"
        - "LAPIS_LAZULI x2"
      source: 200

  # ----------------------------------------------------------
  # ソースジェムブロック - ソースジェム9個の圧縮ストレージ
  # ----------------------------------------------------------
  source_gem_block:
    base_material: PRISMARINE
    custom_model_data: 100012
    display_name: "ソースジェムブロック"
    name_color: "&b"
    lore:
      - "&7ソースジェム9個分の結晶塊"

  # ----------------------------------------------------------
  # マジックファイバー - 魔力を帯びた繊維
  # ----------------------------------------------------------
  magebloom_fiber:
    base_material: STRING
    custom_model_data: 100021
    display_name: "マジックファイバー"
    name_color: "&d"
    lore:
      - "&7魔力を帯びた繊維"
    recipe:
      method: ritual
      core-item: STRING
      pedestal-items:
        - "WHEAT_SEEDS"
        - "custom:source_gem"
      source: 100

  # ----------------------------------------------------------
  # ソースストーン - 魔力を帯びた石
  # ----------------------------------------------------------
  sourcestone:
    base_material: STONE
    custom_model_data: 100031
    display_name: "ソースストーン"
    name_color: "&3"
    lore:
      - "&7魔力を帯びた石"
