# ArsPaper Ritual Recipes Configuration
# core-item: Ritual Coreに配置する素材（任意）
#   - "custom:<item_id>" でカスタムアイテムを指定
#   - "MATERIAL_NAME" でバニラアイテムを指定
# pedestal-items: Pedestalに配置する素材（順不同）
# source: 必要なSource量（近隣のSource Jarから消費）
# result: "custom:<item_id>" or "MATERIAL_NAME"
#
# 本家Ars NouveauのEnchanting Apparatusレシピを参考に、
# バニラ素材で再現したレシピ構成
#
# ※スニーク+右クリックで儀式を発動
# ※右クリックでコアにアイテムを設置/回収

