# ArsPaper Ritual Recipes Configuration
# pedestal-items: Pedestalに配置する素材（順不同）
# source: 必要なSource量（近隣のSource Jarから消費）
# result: "custom:<item_id>" or "MATERIAL_NAME"

rituals:

  # Spell Book Upgrade: Novice → Apprentice
  upgrade_spell_book_apprentice:
    name: "Upgrade to Apprentice Spell Book"
    pedestal-items:
      - DIAMOND
      - DIAMOND
      - GOLD_INGOT
      - GOLD_INGOT
      - LAPIS_LAZULI
      - LAPIS_LAZULI
      - BOOK
      - AMETHYST_SHARD
    source: 500
    result: "custom:spell_book_apprentice"

  # Spell Book Upgrade: Apprentice → Archmage
  upgrade_spell_book_archmage:
    name: "Upgrade to Archmage Spell Book"
    pedestal-items:
      - NETHER_STAR
      - DIAMOND
      - DIAMOND
      - EMERALD
      - EMERALD
      - ECHO_SHARD
      - ECHO_SHARD
      - BOOK
    source: 2000
    result: "custom:spell_book_archmage"

  # Mage Armor - Apprentice Set
  apprentice_armor_set:
    name: "Apprentice Mage Armor Set"
    pedestal-items:
      - GOLD_INGOT
      - GOLD_INGOT
      - GOLD_INGOT
      - GOLD_INGOT
      - LAPIS_LAZULI
      - LAPIS_LAZULI
      - LEATHER
      - LEATHER
    source: 300
    result: "custom:mage_apprentice_chestplate"

  # Mage Armor - Archmage Set
  archmage_armor_set:
    name: "Archmage Mage Armor Set"
    pedestal-items:
      - DIAMOND
      - DIAMOND
      - DIAMOND
      - DIAMOND
      - EMERALD
      - EMERALD
      - NETHER_STAR
      - BLAZE_ROD
    source: 1500
    result: "custom:mage_archmage_chestplate"

  # Source Jar (Alternative ritual crafting)
  ritual_source_jar:
    name: "Enchanted Source Jar"
    pedestal-items:
      - GLASS
      - GLASS
      - GLASS
      - GLASS
      - AMETHYST_SHARD
    source: 100
    result: "custom:source_jar"

  # Ritual Core (Self-replicating)
  ritual_core_craft:
    name: "Ritual Core"
    pedestal-items:
      - LODESTONE
      - DIAMOND
      - DIAMOND
      - LAPIS_LAZULI
      - LAPIS_LAZULI
      - OBSIDIAN
      - OBSIDIAN
      - BLAZE_POWDER
    source: 1000
    result: "custom:ritual_core"
