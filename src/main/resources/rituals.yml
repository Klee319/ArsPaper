  # 中間素材（Intermediate Materials）
  # ============================================================

  source_gem:
    name: "ソースジェム精製"
    core-item: AMETHYST_SHARD
    pedestal-items:
      - AMETHYST_SHARD
      - AMETHYST_SHARD
      - AMETHYST_SHARD
      - LAPIS_LAZULI
      - LAPIS_LAZULI
    source: 200
    result: "custom:source_gem"

  magebloom_fiber:
    name: "マジックファイバー精製"
