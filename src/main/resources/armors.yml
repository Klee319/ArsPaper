# ArsPaper カスタム防具設定
# サーバー管理者がカスタム防具セットを自由に定義できる
#
# display_name_prefix: 防具名のプレフィックス（部位名は自動追加）
# name_color: 名前の色（&0-f またはHex #RRGGBB）
# color: 革防具の色（Hex #RRGGBB、革素材のみ有効）
# material: 見た目素材（LEATHER, IRON, DIAMOND, NETHERITE, CHAINMAIL, GOLD）
# custom_model_data_base: CustomModelData基準値（+0=helmet,+1=chest,+2=legs,+3=boots）
# enchant_glow: エンチャントオーラ表示
# stats:
#   mana_bonus: 最大マナ増加（部位ごと）
#   mana_regen: マナリジェン（部位ごと/config参照の間隔）
#   hit_mana_recovery: 被ダメ時マナ回復量
#   damage_mana_recovery: 与ダメ時マナ回復量
# thread_slots: スレッドスロット数
# durability: 耐久値（0=バニラデフォルト）
# enchantable: 金床エンチャント可能か
# defense: 部位別防御力
# toughness: 防具強度
# lore: アイテム説明文（&色コード対応）

