    RABBIT: 5
    COOKIE: 5
    BAKED_POTATO: 5
    BREAD: 5
    COOKED_COD: 5
    COOKED_SALMON: 5
    BEETROOT_SOUP: 5
    COOKED_CHICKEN: 5
    # Higher (7)
