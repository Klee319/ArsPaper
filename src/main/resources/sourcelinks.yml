    GLOW_BERRIES: 1
    APPLE: 1
    CARROT: 1
    POTATO: 1
    BEETROOT: 1
    # Basic processed (3)
    DRIED_KELP: 3
    SPIDER_EYE: 3
    COD: 3
    SALMON: 3
    CHICKEN: 3
    MUTTON: 3
    BEEF: 3
    PORKCHOP: 3
    # Medium (5)
