# =============================================================================
# Sourcelink Material Values Configuration
# =============================================================================
# Each sourcelink type has a "materials" section mapping Material names to
# source point values. You can add, remove, or modify entries freely.
#
# Material names must match org.bukkit.Material enum values exactly.
# =============================================================================

# --- Volcanic Sourcelink (FURNACE) ---
# Fuel items consumed to generate Source.
# Reference: coal (1600 burn ticks) = 5 source points
volcanic:
  materials:
    # Minimal (1): sticks, bamboo, carpets, slabs, planks
    STICK: 1
    BAMBOO: 1
    WHITE_CARPET: 1
    OAK_SLAB: 1
    SPRUCE_SLAB: 1
    BIRCH_SLAB: 1
    JUNGLE_SLAB: 1
    ACACIA_SLAB: 1
    DARK_OAK_SLAB: 1
    MANGROVE_SLAB: 1
    CHERRY_SLAB: 1
    BAMBOO_SLAB: 1
    OAK_PLANKS: 1
    SPRUCE_PLANKS: 1
    BIRCH_PLANKS: 1
    JUNGLE_PLANKS: 1
    ACACIA_PLANKS: 1
    DARK_OAK_PLANKS: 1
    MANGROVE_PLANKS: 1
    CHERRY_PLANKS: 1
    BAMBOO_PLANKS: 1
    # Logs (3)
    OAK_LOG: 3
    SPRUCE_LOG: 3
    BIRCH_LOG: 3
    JUNGLE_LOG: 3
    ACACIA_LOG: 3
    DARK_OAK_LOG: 3
    MANGROVE_LOG: 3
    CHERRY_LOG: 3
    # Standard (5): coal, charcoal
    CHARCOAL: 5
    COAL: 5
    # High (10): blaze rod, dried kelp block
    BLAZE_ROD: 10
    DRIED_KELP_BLOCK: 10
    # Very high (45): coal block
    COAL_BLOCK: 45
    # Maximum (100): lava bucket
    LAVA_BUCKET: 100

