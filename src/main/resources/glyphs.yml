    unlock-cost:
      level: 40
      materials:
        SHULKER_SHELL: 4
        ENDER_EYE: 16
        SNOWBALL: 16

  # 説明: ブロック着弾時に周辺エンティティにも効果を伝播する（投射/接触用、1個まで）
  propagate:
    tier: 2
    mana-cost: 20
    # 投射/接触互換
    # ブロック着弾時に周辺エンティティにも効果を伝播
    # 半径増加と組み合わせて伝播範囲を拡大可能
    unlock-cost:
      level: 20
      materials:
        GRASS_BLOCK: 16
        MOSS_BLOCK: 16
        PODZOL: 16

  # --- 特殊限定 ---

  # 説明: シルクタッチ効果を付与する（幸運と排他）
  extract:
    tier: 2
    mana-cost: 30
    unlock-cost:
      level: 20
      materials:
        COBWEB: 16
        FEATHER: 16

  # 説明: ドロップ量を増加させる（抽出と排他）
  fortune:
    tier: 2
    mana-cost: 25
    unlock-cost:
      level: 20
      materials:
        EMERALD_BLOCK: 4
        LAPIS_BLOCK: 4

  # 説明: 命中範囲に効果を持続的に再発動するエリアを生成する
  linger:
    tier: 3
    mana-cost: 80
    # 命中範囲に効果を持続的に再発動するエリアを生成
    # ルーン：残留を組み合わせると発動後も効果が残る
    # エンティティ効果系（凍結、害悪、治癒等）にも互換
    # params (設定可能な定数):
    #   zone-radius: 3.0 (ブロック、残留エリア半径)
    #   base-duration-ticks: 100 (tick=5秒、基本残留持続)
    #   duration-bonus-per-level: 60 (tick=3秒/段、延長あたり加算)
    #   zone-tick-interval: 20 (tick=1秒、効果再適用間隔)
    unlock-cost:
      level: 40
      materials:
        OMINOUS_BOTTLE: 1
        DRAGON_BREATH: 4

