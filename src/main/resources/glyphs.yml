        ARROW: 4

  launch:
    tier: 1
    mana-cost: 30
    # 増幅:打ち上げ力↑ | 減少:打ち上げ力↓
    max-augments:
      amplify: 3
    unlock-cost:
      level: 5
      materials:
        FIREWORK_ROCKET: 4
        FEATHER: 2

  leap:
    tier: 1
    mana-cost: 25
