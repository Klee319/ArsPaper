      - break
      - advanced_break
      - grow
      - harvest
      - fell
      - cut
      - rotate
      - smelt
      - crush
      - exchange
      - interact
      # 設置・生成系
      - light

      - phantom_block
      - place_block
      - conjure_water
      - rune
      - intangible
      # 環境系
      - ignite
      - freeze
      - evaporate
      - gravity
      - lightning
      - fangs
      - explosion
      - wind_burst
      # ユーティリティ系
      - pickup
      - firework
      - prestidigitation
    unlock-cost:
