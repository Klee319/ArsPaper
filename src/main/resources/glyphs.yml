  # 説明: 視線方向にテレポートする。延伸で距離延長+透過ブロック貫通
  blink:
    tier: 3
    mana-cost: 50
    # 延伸:テレポート距離↑(+8ブロック/段)
    # 貫通:ブロック貫通TP（1段につき1ブロック貫通）
    # 対象エンティティとは位置交換（互いの向きを維持）
    max-augments:
      extend_reach: 6
      shrink_reach: 1
      pierce: 4
    params:
      base-distance: 16             # 基本テレポート距離(ブロック)
