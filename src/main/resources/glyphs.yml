# グリフ設定ファイル
# 各グリフのティア、マナコスト、解放コスト、上限を定義
# 本家Ars Nouveauのソースコード準拠
#
# tier: スペルブックのティア制限（1=Novice, 2=Apprentice, 3=Archmage）
# mana-cost: スペル発動時のマナ消費量
# max-augments: 各増強の最大スタック数（未設定=無制限、サーバー管理者が引き上げ可能）
# params: エフェクト固有の数値パラメータ（ダメージ量、持続時間等の係数調整用）
# ※ 増強の互換性はソースコード定義（GlyphConfig.AUGMENT_COMPAT）
# unlock-cost:
#   level: 必要経験値レベル
#   materials: 必要素材（素材名: 個数）
#
# ===== 増強カテゴリ一覧 =====
# amplify    (増幅)     : 効果の強度・威力を上昇させる
# dampen     (減少)     : 効果の強度・威力を低下させる
# aoe        (幅)         : 左右に範囲を広げる
# aoe_height (上下)       : 上下に範囲を広げる
# aoe_vertical(範囲[全長]): 面に垂直な方向に2ブロック延長
# aoe_radius (半径増加)  : 爆発威力・召喚数・拾い範囲等を拡大する
# extend_time(延長)     : 持続時間を延長する
# duration_down(短縮)   : 持続時間を短縮する
# accelerate (加速)     : 速度を上昇させる（投擲・軌道用）
# decelerate (減速)     : 速度を低下させる（投擲・軌道用）
# pierce     (貫通)     : 投擲が対象を貫通する
# split      (分裂)     : 投擲が複数に分裂する
# extract    (抽出)     : シルクタッチ効果を付与する（幸運と排他）
# fortune    (幸運)     : ドロップ量を増加させる（抽出と排他）
# randomize  (無作為)   : 効果にランダム性を付与する
# rapid_fire (連射)     : スペルのCTを半減する（全形態互換、複数積み可、照射は2個内蔵）
# --- 以下は汎用増強（全エフェクトに使用可能）---
# delay      (遅延)     : 後続効果の発動を遅延させる（複数積みで遅延時間加算）
# --- 以下は限定互換増強 ---
# linger     (残留)     : 命中範囲に効果を持続的に再発動するエリアを生成
#                          ルーン+残留で発動後も効果が残る
# propagate  (伝播)     : 投射/接触互換。ブロック着弾時に周辺エンティティにも効果を伝播

glyphs:

  # ============================================================
  # Forms（形態）- スペルの発動方法を決定する
  # ============================================================

  # 説明: 弾を発射し着弾地点に効果を適用する
  projectile:
    tier: 1
    mana-cost: 10
    # 加速:弾速↑ | 減速:弾速↓ | 貫通:対象を貫通 | 分裂:弾が複数化
    # 軌跡:飛行経路上にも効果 | 延伸:射程延長 | 伝播:ブロック着弾→周辺伝播
    # effects空=全効果互換
    max-augments:
      propagate: 1
    unlock-cost:
      level: 5
      materials:
        ARROW: 16
        LAPIS_BLOCK: 1

  # 説明: 近接距離の対象に直接効果を適用する
  touch:
    tier: 1
    mana-cost: 10
    # 伝播:ブロック着弾→周辺伝播
    # effects空=全効果互換（投擲のみコード側で除外）
    max-augments:
      propagate: 1
    unlock-cost:
      level: 5
      materials:
        OAK_BUTTON: 4
        LAPIS_BLOCK: 1

  # 説明: 自分自身に効果を適用する
  self:
    tier: 1
    mana-cost: 10
    unlock-cost:
      level: 5
      materials:
        IRON_CHESTPLATE: 1
        LAPIS_BLOCK: 1

  # 説明: 足元のブロックに効果を適用する
  underfoot:
    tier: 1
    mana-cost: 10
    unlock-cost:
      level: 5
      materials:
        IRON_BOOTS: 1
        LAPIS_BLOCK: 1

  # 説明: 自身の周囲を回転する球体が接触した対象に効果を適用する
  orbit:
    tier: 2
    mana-cost: 50
    # 加速:回転速度↑ | 減速:回転速度↓ | 分裂:軌道数増加
    # 延長:旋回持続+3秒/段 | 短縮:旋回持続-3秒/段 | 半径増加:軌道半径↑
    unlock-cost:
      level: 20
      materials:
        ENDER_EYE: 8
        AMETHYST_SHARD: 8
        COMPASS: 1

  # 説明: 直線レーザーを照射し経路上の全対象に効果を適用する（デフォルト全貫通）
  beam:
    tier: 3
    mana-cost: 80
    # デフォルト全貫通 | 加速:射程↑ | 減速:射程↓ | 分裂:複数ビーム
    # 半径増加:ビームが太くなる（範囲内全エンティティ対象）
    # 軌跡:軌道上のブロックにも効果 | 延伸:射程延長
    # 全効果互換
    unlock-cost:
      level: 40
      materials:
        BEACON: 1
        DRAGON_BREATH: 4
        SEA_LANTERN: 16
  
  # ============================================================
  # Effects（効果）- Tier 1 (Novice)
  # ============================================================

  # 説明: ブロックを破壊する。増幅でツールティア上昇
  break:
    tier: 1
    mana-cost: 20
    # 増幅:ツールティア上昇(0=石, 1=鉄, 2=ダイヤ, 3=ネザライト) + 破壊可能硬度上昇
    # 減少:ユーティリティモード(道/樹皮剥ぎ/さび落とし/さび止め落とし/苔落とし)
    # 範囲:範囲破壊 | 抽出:シルクタッチ | 幸運:ドロップ増
    max-augments:
      amplify: 3  # 0=石(硬度25), 1=鉄(硬度50), 2=ダイヤ(硬度75,黒曜石可), 3=ネザライト(硬度100)
      dampen: 1   # ※ON/OFFのみ（ユーティリティモード切替）
      aoe: 7
      fortune: 3
      extract: 1  # ※ON/OFFのみ（シルクタッチは2段階以上なし）
    # params (設定可能な定数):
    #   max-hardness: 25.0 (基礎破壊可能硬度上限)
    #   hardness-per-amplify: 25.0 (増幅1段ごとの硬度上限増加)
    unlock-cost:
      level: 15
      materials:
        GOLDEN_PICKAXE: 1
        IRON_PICKAXE: 1
        STONE_PICKAXE: 1

  # 説明: 対象にダメージを与え毒を付与する
  harm:
    tier: 1
    mana-cost: 20
    # 増幅:ダメージ↑(+2.0HP/段) | 減少:ダメージ↓ | 半径増加:範囲ダメージ
    # 延長:毒の持続延長(+3秒/段) | 短縮:毒の持続短縮
    max-augments:
      amplify: 5
      aoe_radius: 7
      extend_time: 7
      duration_down: 7
    # params (設定可能な定数):
    #   base-damage: 5.0 (HP、基本ダメージ)
    #   amplify-bonus: 2.0 (HP/段、増幅1段あたり+2.0HP)
    #   base-poison-seconds: 5 (秒、基本毒持続)
    #   poison-seconds-per-duration: 3 (秒/段、延長1段あたり+3秒)
    params:
      base-damage: 5.0
      amplify-bonus: 3.0
      base-poison-seconds: 5
      poison-seconds-per-duration: 3
    unlock-cost:
      level: 15
      materials:
        STONE_SWORD: 1
        IRON_SWORD: 1
        GOLDEN_SWORD: 1

  # 説明: 対象を炎上させカスタム火炎ダメージを与える（火炎耐性有効）
  ignite:
    tier: 2
    mana-cost: 25
    # 増幅:火炎ダメージ↑(+0.5HP/段) | 減少:ダメージ↓ | 半径増加:範囲着火
    # 延長:炎上持続延長(+20tick/段) | 短縮:持続短縮
    # 火炎耐性が有効（DamageType.ON_FIRE使用）
    max-augments:
      amplify: 5
      aoe_radius: 7
      extend_time: 7
      duration_down: 7
    # params (設定可能な定数):
    #   base-fire-ticks: 60 (tick=3秒、基本炎上持続)
    #   duration-bonus-ticks: 20 (tick/段、延長1段あたり+1秒)
    #   base-damage: 1.0 (HP、1回あたりの火炎ダメージ)
    #   amplify-damage-bonus: 0.5 (HP/段、増幅1段あたり+0.5HP)
    #   damage-interval: 20 (tick=1秒、ダメージ間隔)

    unlock-cost:
      level: 20
      materials:
        FLINT: 16
        FIRE_CHARGE: 4

  # 説明: 対象を凍結させ移動を阻害する
  freeze:
    tier: 2
    mana-cost: 25
    # 増幅:凍結強度↑ | 減少:凍結強度↓ | 半径増加:範囲凍結
    # 延長:凍結持続延長 | 短縮:凍結持続短縮
    max-augments:
      amplify: 5
      aoe_radius: 7
      extend_time: 7
      duration_down: 7
    # params (設定可能な定数):
    #   base-duration: 100 (tick=5秒、基本凍結持続)
    #   duration-per-level: 200 (tick=10秒/段、延長1段あたり加算)
    unlock-cost:
      level: 20
      materials:
        ICE: 16
        POWDER_SNOW_BUCKET: 1

  # 説明: 対象を吹き飛ばす（自己:視線の反対方向）
  knockback:
    tier: 2
    mana-cost: 25
    # 増幅:吹き飛ばし力↑(+1.0/段) | 減少:吹き飛ばし力↓ | 半径増加:範囲吹き飛ばし
    max-augments:
      amplify: 5
      aoe_radius: 7
    # params (設定可能な定数):
    #   base-force: 1.5
    #   amplify-bonus: 1.0 (/段、増幅1段あたり+1.0)
    #   max-force: 5.0 (吹き飛ばし力上限。大きすぎると制御不能)
    params :
      base-force: 1.5
      amplify-bonus: 1.0 
      max-force: 6.5
    unlock-cost:
      level: 20
      materials:
        PISTON: 16
        WIND_CHARGE: 4

  # 説明: 対象を術者方向に引き寄せる
  pull:
    tier: 2
    mana-cost: 25
    # 増幅:引き寄せ力↑(+0.5/段) | 減少:引き寄せ力↓ | 半径増加:範囲引き寄せ
    max-augments:
      amplify: 5
      aoe_radius: 7
    # params (設定可能な定数):
    #   base-force: 0.8
    #   amplify-bonus: 0.5 (/段、増幅1段あたり+0.5)
    #   max-force: 3.0 (引き寄せ力上限。大きすぎると制御不能)
    #   min-y: 0.15
    params:
      base-force: 1.0
      amplify-bonus: 0.5 
      max-force: 3.5
      min-y: 0.15
    unlock-cost:
      level: 20
      materials:
        FISHING_ROD: 1
        SLIME_BLOCK: 4

  # 説明: 対象に重力効果を付与し押し下げる
  gravity:
    tier: 2
    mana-cost: 25
    # 増幅:重力効果↑ | 減少:重力効果↓(浮遊) | 半径増加:範囲重力
    # 延長:持続延長 | 短縮:持続短縮
    max-augments:
      amplify: 5
      aoe_radius: 7
      extend_time: 7
      duration_down: 7
    # params (設定可能な定数):
    #   base-push-down: 0.5 (重力の基本強度)
    #   amplify-push-bonus: 0.25 (/段、増幅あたり加算)
    #   gravity-duration-base-ticks: 100 (tick=5秒、基本持続)
    #   gravity-duration-per-level-ticks: 60 (tick=3秒/段、延長あたり加算)
    unlock-cost:
      level: 20
      materials:
        ANVIL: 1
        SAND: 32

  # 説明: ブロック→松明設置（壁対応）、エンティティ→暗視+発光付与
  light:
    tier: 1
    mana-cost: 15
    # 増幅:暗視レベル↑ | 減少:暗視レベル↓ | 範囲:範囲設置
    # 延長:暗視持続延長 | 短縮:暗視持続短縮
    # ブロック→松明設置 | エンティティ→暗視+発光付与
    max-augments:
      amplify: 1
      aoe: 7
      extend_time: 7
    # params (設定可能な定数):
    #   base-duration-ticks: 600 (tick=30秒、暗視/発光の基本持続)
    unlock-cost:
      level: 10
      materials:
        LANTERN: 4
        TORCH: 16

  # 説明: 成熟した作物を収穫する。増幅で植え直し確率上昇（正方形範囲）
  harvest:
    tier: 1
    mana-cost: 15
    # 増幅:植え直し確率(1=33%,2=66%,3=100%) | 減少:効果なし
    # 半径増加:範囲収穫 | 幸運:ドロップ増 | 抽出:シルクタッチ
    # 耕地化・花/雑草の破壊にも対応
    max-augments:
      amplify: 3
      aoe_radius: 7
      fortune: 3
      extract: 1  # ※ON/OFFのみ
    unlock-cost:
      level: 10
      materials:
        IRON_HOE: 1
        GOLDEN_HOE: 1
        STONE_HOE: 1

  # 説明: 草・つる・羊毛等を刈り取る
  cut:
    tier: 1
    mana-cost: 15
    # 範囲:範囲カット
    max-augments:
      aoe: 7
    unlock-cost:
      level: 10
      materials:
        SHEARS: 1
        OAK_LEAVES: 16

  # 説明: 対象ブロックに遠隔で右クリック操作を行う（全ブロック対応）
  interact:
    tier: 1
    mana-cost: 10
    # 範囲:範囲操作 | 延長:ボタン長押し持続延長 | 短縮:持続短縮
    # 遠隔で右クリック操作（ドア開閉・ボタン押下・レバー操作）
    max-augments:
      aoe: 7
      extend_time: 7
    unlock-cost:
      level: 10
      materials:
        LEVER: 4
        STONE_BUTTON: 4

  # 説明: 周囲のドロップアイテムを拾い術者に渡す
  pickup:
    tier: 1
    mana-cost: 20
    # 半径増加:拾得範囲拡大
    max-augments:
      aoe_radius: 7
    # params (設定可能な定数):
    #   base-radius: 2.0 (球体、基本拾得範囲)
    unlock-cost:
      level: 15
      materials:
        HOPPER: 4
        CHEST: 4

  # 説明: ブロックの向きを回転させる
  rotate:
    tier: 2
    mana-cost: 25
    # 増幅:回転角度↑ | 減少:回転角度↓ | 半径増加:範囲回転
    # 延長:継続回転 | 短縮:回転短縮
    max-augments:
      amplify: 3
      aoe_radius: 7
      extend_time: 7
    # params (設定可能な定数):
    #   base-lock-ticks: 60 (tick=3秒、操作ロック時間)
    #   lock-bonus-ticks: 40 (tick=2秒/段、延長あたり加算)
    unlock-cost:
      level: 20
      materials:
        COMPASS: 4
        REDSTONE_BLOCK: 4

  # 説明: 木を一括伐採する
  fell:
    tier: 1
    mana-cost: 20
    # 半径増加:伐採範囲拡大
    max-augments:
      aoe_radius: 7
    # params (設定可能な定数):
    #   base-max-blocks: 50 (最大伐採ブロック数)
    #   aoe-bonus-blocks: 50 (/段、半径増加あたり加算)
    unlock-cost:
      level: 15
      materials:
        IRON_AXE: 1
        GOLDEN_AXE: 1
        STONE_AXE: 1

  # 説明: 一時的なガラスブロックを設置する。増幅で永続化
  phantom_block:
    tier: 1
    mana-cost: 15
    # 増幅:永続ブロック化(一時でなくなる、ON/OFF) | 減少:効果なし | 範囲:範囲設置
    # 延長:一時ブロック持続延長 | 短縮:持続短縮
    # 破壊時ドロップなし
    max-augments:
      amplify: 1
      aoe: 7
      extend_time: 7
    # params (設定可能な定数):
    #   base-removal-ticks: 200 (tick=10秒、一時ブロック消滅までの時間)
    #   duration-bonus-ticks: 100 (tick=5秒/段、延長あたり加算)
    unlock-cost:
      level: 15
      materials:
        GLASS: 16
        WHITE_WOOL: 8
        

  # 説明: 手持ちのブロックを遠隔設置する
  place_block:
    tier: 1
    mana-cost: 15
    # 範囲:範囲設置
    # オフハンドまたはホットバー右側のブロックを設置
    max-augments:
      aoe: 7
    unlock-cost:
      level: 15
      materials:
        DISPENSER: 4
        COBBLESTONE: 64


  # 説明: エンティティを上方に打ち上げる。ブロック対象はFallingBlock化
  launch:
    tier: 2
    mana-cost: 25
    # 増幅:打ち上げ力↑(+0.8/段) | 減少:打ち上げ力↓ | 半径増加:AOE打ち上げ範囲
    max-augments:
      amplify: 5
      aoe_radius: 7
    # params (設定可能な定数):
    #   base-velocity: 1.5
    #   amplify-bonus: 0.8 (/段、増幅1段あたり+0.8)
    #   max-velocity: 5.0 (打ち上げ速度上限。大きすぎると天井貫通)
    params (設定可能な定数):
      base-velocity: 1.0
      amplify-bonus: 0.8
      max-velocity: 5.0
    unlock-cost:
      level: 20
      materials:
        FIREWORK_ROCKET: 8
        FEATHER: 4

  # 説明: 対象をその視線方向に飛び出させる（敵に使うと敵の向きに飛ぶ）
  leap:
    tier: 2
    mana-cost: 25
    # 増幅:前方跳躍力↑(+0.3/段) | 減少:跳躍力↓
    max-augments:
      amplify: 5
    # params (設定可能な定数):
    #   base-velocity: 1.0
    #   amplify-bonus: 0.3 (/段、増幅1段あたり+0.3)
    #   max-velocity: 3.0 (跳躍速度上限。大きすぎると制御不能)
    params (設定可能な定数):
      base-velocity: 1.0
      amplify-bonus: 0.3 
      max-velocity: 2.5
    unlock-cost:
      level: 20
      materials:
        RABBIT_FOOT: 1
        FEATHER: 4

  # 説明: 着地時に自動で跳ね返る効果を付与する
  bounce:
    tier: 2
    mana-cost: 25
    # 増幅:バウンド高度↑ | 減少:バウンド高度↓ | 半径増加:AOE跳弾範囲
    # 延長:バウンド持続延長(+160tick/段) | 短縮:バウンド持続短縮
    # 着地時に自動ジャンプする効果を付与
    max-augments:
      amplify: 5
      aoe_radius: 7
      extend_time: 7
      duration_down: 7
    # params (設定可能な定数):
    #   base-duration: 600 (tick=30秒)
    #   duration-per-level: 160 (tick=8秒/段、延長1段あたり+8秒)
    params (設定可能な定数):
      base-duration: 200 
      duration-per-level: 100
    unlock-cost:
      level: 20
      materials:
        SLIME_BLOCK: 4
        RABBIT_FOOT: 1

  # 説明: 対象の移動・ジャンプを完全に封じる
  snare:
    tier: 3
    mana-cost: 50
    # 半径増加:範囲拘束 | 延長:拘束持続延長(+20tick/段) | 短縮:拘束持続短縮
    # ※コードではSlowness 255固定のためamplifyは効果なし
    max-augments:
      aoe_radius: 7
      extend_time: 7
      duration_down: 7
    # params (設定可能な定数):
    #   base-duration: 160 (tick=8秒)
    #   duration-per-level: 20 (tick=1秒/段、延長1段あたり+1秒)
    params :
      base-duration: 60 
      duration-per-level: 20
    unlock-cost:
      level: 30
      materials:
        COBWEB: 16
        OBSIDIAN: 16

  # 説明: 水源・水流を除去する
  evaporate:
    tier: 1
    mana-cost: 30
