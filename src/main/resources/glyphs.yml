    max-augments:
      amplify: 3
      aoe_radius: 7
      extend_time: 7
      duration_down: 7
    # params (設定可能な定数):
    #   base-duration: 400 (tick=20秒、基本呪い持続)
    #   duration-per-level: 160 (tick=8秒/段、延長あたり加算)
    #   max-amplifier: 4 (弱体化最大レベル + 追撃倍率上限)
    #   base-damage-percent: 0.10 (基本追撃率10%)
    #   amplify-bonus-percent: 0.05 (増幅1段あたり+5%)
    params:
      max-amplifier: 4
      base-damage-percent: 0.10
      amplify-bonus-percent: 0.05
    unlock-cost:
      level: 40
      materials:
        FERMENTED_SPIDER_EYE: 16
        WITHER_ROSE: 16
        PUFFERFISH: 16

  # 説明: エリトラなしで一時的に滑空できる
  glide:
    tier: 2
    mana-cost: 50
    # 延長:滑空持続延長(+100tick/段) | 短縮:持続短縮
    max-augments:
      extend_time: 7
    # params (設定可能な定数):
    #   base-duration: 300 (tick=15秒)
    #   duration-per-level: 100 (tick=5秒/段、延長1段あたり+5秒)
    unlock-cost:
      level: 20
      materials:
        PHANTOM_MEMBRANE: 8
        FEATHER: 16
        AMETHYST_SHARD: 8

  # 説明: 耐性+吸収効果のシールドを展開する
  shield:
    tier: 3
    mana-cost: 150
    # 増幅:耐性レベル↑(最大Lv3) | 減少:耐性レベル↓
    # 延長:シールド持続延長(+160tick/段) | 短縮:持続短縮
    max-augments:
      amplify: 3
      extend_time: 7
      duration_down: 7
    # params (設定可能な定数):
    #   base-duration: 200 (tick=10秒)
    #   duration-per-level: 160 (tick=8秒/段、延長1段あたり+8秒)
    #   max-amplifier: 3 (耐性最大Lv。※Lv5以上で完全無敵、注意)
    unlock-cost:
      level: 20
      materials:
        DIAMOND_BLOCK: 4
        ENCHANTED_GOLDEN_APPLE: 1
        TOTEM_OF_UNDYING: 1

  # 説明: 一時的なゾンビを召喚する。増幅でスケルトンに切替
  summon_undead:
    tier: 3
    mana-cost: 120
    # 増幅:Skeleton(遠距離攻撃)に切替 | 減少:効果なし
    # 半径増加:召喚数↑(最大4体) | 延長:持続延長(+160tick/段) | 短縮:持続短縮
    max-augments:
      amplify: 1  # ※1超は効果なし（0=Zombie,1+=Skeletonの2段階のみ）
      aoe_radius: 7
      extend_time: 7
      duration_down: 7
    # params (設定可能な定数):
    #   base-duration-ticks: 300 (tick=15秒)
    #   duration-per-level-ticks: 160 (tick=8秒/段、延長1段あたり+8秒)
    #   max-summons: 4
    params :
      base-duration-ticks: 300 
      duration-per-level-ticks: 160 
      max-summons: 8
    unlock-cost:
      level: 40
      materials:
        ROTTEN_FLESH: 64
        BONE_BLOCK: 16

  # 説明: 一時的なヴェックスを召喚する
  summon_vex:
    tier: 3
    mana-cost: 150
    # 増幅:ヴェックスHP↑(+4HP/段) | 減少:HP↓
    # 半径増加:召喚数↑(最大3体) | 延長:持続延長 | 短縮:持続短縮
    max-augments:
      amplify: 5
      aoe_radius: 7
      extend_time: 7
      duration_down: 7
    # params (設定可能な定数):
    #   max-summons: 3 (最大召喚数。多すぎるとサーバー負荷)
    params (設定可能な定数):
      max-summons: 8
    unlock-cost:
      level: 40
      materials:
        TOTEM_OF_UNDYING: 4
        EMERALD_BLOCK: 16

  # 説明: キャスターの装備をコピーした囮ゾンビを召喚する
  summon_decoy:
    tier: 3
    mana-cost: 200
    # 増幅:囮HP↑(+10HP/段) | 減少:HP↓
    # 延長:持続延長(+100tick/段) | 短縮:持続短縮
    # キャスターの装備をコピーした囮Zombieを召喚
    max-augments:
      amplify: 5
      extend_time: 7
    # params (設定可能な定数):
    #   base-duration-ticks: 200 (tick=10秒)
    #   duration-per-level-ticks: 100 (tick=5秒/段、延長1段あたり+5秒)
    #   base-health: 20.0 (HP)
    #   health-per-amplify: 10.0 (HP/段、増幅1段あたり+10.0HP)
    unlock-cost:
      level: 40
      materials:
        ARMOR_STAND: 16
        NETHERITE_SWORD: 1
        NETHERITE_CHESTPLATE: 1

  # 説明: ブロックを一時的に透過可能にする
  intangible:
    tier: 3
    mana-cost: 30
    # 幅:左右に範囲拡大 | 上下:縦方向に拡大 | 垂直:視線奥方向に拡大
    # 延長:透過持続延長 | 短縮:持続短縮
    # ※奥行き方向は設置と逆（壁の中に向かって透過）
    max-augments:
      aoe: 7
      extend_time: 7
      duration_down: 7
    unlock-cost:
      level: 20
      materials:
        GLASS: 64
        ENDER_PEARL: 16
        ENDER_EYE: 16

  # 説明: 発動時の位置を記録し、一定時間後にその位置へ自動テレポートする
  rewind:
    tier: 3
    mana-cost: 120
    # 延長:帰還までの遅延時間↑ | 短縮:遅延時間↓
    # 発動時の位置をマークし、遅延後にマーク地点へテレポート
    max-augments:
      extend_time: 7
    # params (設定可能な定数):
    #   base-delay-ticks: 60 (tick=3秒、帰還までの基本遅延)
    #   delay-per-level-ticks: 40 (tick=2秒/段、延長あたり加算)
    unlock-cost:
      level: 40
      materials:
        CLOCK: 16
        RECOVERY_COMPASS: 1

  # 説明: エヴォーカーの牙を召喚してダメージを与える
  fangs:
    tier: 3
    mana-cost: 35
    # 増幅:牙の本数↑(+2本/段) | 減少:本数↓ | 半径増加:円形配置に変更
    # エヴォーカーの牙を召喚してダメージを与える
    max-augments:
      amplify: 7
      aoe_radius: 7
    # params (設定可能な定数):
    #   max-fangs: 15 (牙の最大数。多すぎるとサーバー負荷)
    unlock-cost:
      level: 40
      materials:
        TOTEM_OF_UNDYING: 4
        EMERALD_BLOCK: 16

  # 説明: 幸運3+ダイヤツール相当の強化版破壊
  advanced_break:
    tier: 3
    mana-cost: 100
    # 範囲:範囲破壊 | 抽出:シルクタッチ(内蔵幸運3を上書き) | 幸運:内蔵幸運3に加算
    # 幸運3+ダイヤツール相当の破壊力を内蔵
    max-augments:
      aoe: 7
      fortune: 0  # ※内蔵幸運3に加算（1にすると幸運4、2で幸運5）
      extract: 1
    unlock-cost:
      level: 40
      materials:
        NETHERITE_PICKAXE: 1
        DIAMOND_BLOCK: 2

  # ============================================================
  # Augments（増強）- 汎用性の高い順にソート
  # ============================================================

  # --- 汎用（全形態互換） ---

  # 説明: 後続効果の発動を遅延させる（複数積みで遅延時間加算）
  delay:
    tier: 1
    mana-cost: 5
    # 延長:遅延時間↑ | 短縮:遅延時間↓ | 無作為:遅延を±25%変動
    # params (設定可能な定数):
    #   base-delay-ticks: 20 (tick=1秒、基本遅延時間)
    #   duration-bonus-ticks: 20 (tick=1秒/段、延長あたり加算)
    unlock-cost:
      level: 10
      materials:
        CLOCK: 4
        REPEATER: 4

  # 説明: スペルのCTを短縮する（1段=-100ms、最低100ms）
  rapid_fire:
    tier: 2
    mana-cost: 20
    # 全形態互換。1つにつきCTを-100ms（最低100ms）
    unlock-cost:
      level: 20
      materials:
        SUGAR: 64
        COMPARATOR: 16

  # --- 広汎（多くのエフェクトに互換） ---

  # 説明: 効果の強度・威力を上昇させる
  amplify:
    tier: 1
    mana-cost: 20
    unlock-cost:
      level: 10
      materials:
        DIAMOND_PICKAXE: 2
        GLOWSTONE_DUST: 8

  # 説明: 効果の強度・威力を低下させる
  dampen:
    tier: 1
    mana-cost: 0
    unlock-cost:
      level: 5
      materials:
        NETHER_BRICKS: 4
        CRACKED_STONE_BRICKS: 4

  # 説明: 持続時間を延長する
  extend_time:
    tier: 1
    mana-cost: 10
    unlock-cost:
      level: 10
      materials:
        REDSTONE_BLOCK: 4
        CLOCK: 4

  # 説明: 持続時間を短縮する
  duration_down:
    tier: 1
    mana-cost: 0
    unlock-cost:
      level: 5
      materials:
        QUARTZ_BLOCK: 4
        CLOCK: 4

  # 説明: XZ方向に範囲を広げる（3軸AOE）
  aoe:
    tier: 1
    mana-cost: 15
    unlock-cost:
      level: 10
      materials:
        DIORITE_WALL: 16
        STONE: 32

  # 説明: Y方向（上下）に範囲を広げる（3軸AOE）
  aoe_height:
    tier: 1
    mana-cost: 15
    unlock-cost:
      level: 10
      materials:
        GRANITE_WALL: 16
        STONE: 32

  # 説明: 面に垂直な方向に範囲を延長する（3軸AOE）
  aoe_vertical:
    tier: 1
    mana-cost: 15
    unlock-cost:
      level: 10
      materials:
        ANDESITE_WALL: 16
        STONE: 32

  # 説明: 半径を拡大する（爆発/召喚数/拾い範囲等）
  aoe_radius:
    tier: 2
    mana-cost: 20
    unlock-cost:
      level: 20
      materials:
        JUKEBOX: 4
        NOTE_BLOCK: 16

  # 説明: 効果にランダム性を付与する
  randomize:
    tier: 1
    mana-cost: 5
    unlock-cost:
      level: 5
      materials:
        TARGET: 4
        DROPPER: 4

  # --- 形態限定（投射/照射/接触等） ---

  # 説明: 弾速・射程を上昇させる（投射/照射用）
  accelerate:
    tier: 2
    mana-cost: 10
    unlock-cost:
      level: 20
      materials:
        SUGAR: 64
        BLAZE_ROD: 1

  # 説明: 弾速・射程を低下させる（投射/照射用）
  decelerate:
    tier: 2
    mana-cost: 0
    unlock-cost:
      level: 5
      materials:
        SOUL_SAND: 4
        HONEY_BLOCK: 1

  # 説明: 投擲が対象を貫通する
  pierce:
    tier: 2
    mana-cost: 10
    unlock-cost:
      level: 20
      materials:
        CROSSBOW: 1
        DIAMOND_SWORD: 1

  # 説明: 射程・距離を延長する（投射/照射/瞬間移動用）
  extend_reach:
    tier: 2
    mana-cost: 15
    # 射程・距離を延長する増強
    # 瞬間移動の距離、投射の射程等に適用
    unlock-cost:
      level: 20
      materials:
        FISHING_ROD: 1
        DIAMOND_SWORD: 1

  # 説明: 投擲・ビームを複数に分裂させる
  split:
    tier: 2
    mana-cost: 20
    unlock-cost:
      level: 20
      materials:
        SLIME_BLOCK: 16
        CROSSBOW: 1

  # 説明: 飛行経路上のブロックにも効果を適用する（投射/照射用）
  trace:
    tier: 3
    mana-cost: 25
    # 投射/照射互換
