      materials:
        IRON_BOOTS: 1
        OAK_PRESSURE_PLATE: 2

  orbit:
    tier: 3
    mana-cost: 50
    # 増幅:発動頻度↑ | 減少:発動頻度↓ | 分裂:軌道数増加
    # 延長:旋回持続+3秒/段 | 短縮:旋回持続-3秒/段
    effects:
      # ダメージ・CC系
      - harm
      - heal
      - ignite
      - freeze
      - knockback
      - pull
      - gravity
      - snare
      - cold_snap
      - flare
      - windshear
      - lightning
      - wither
      - hex
      - fangs
      - explosion
      - crush
      # 移動妨害・操作系
      - levitate
      - launch
      - wind_burst
      - bounce
      - dispel
