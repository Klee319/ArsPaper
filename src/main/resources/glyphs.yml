      - heal
      - light
      - bounce
      - leap
      - launch
      - blink
      - shield
      - glide
      - slowfall
      - invisibility
      - rewind
      - dispel
      - infuse
      - bubble
      # デバフ系（自傷）
      - harm
      - ignite
      - freeze
      - gravity
      - snare
      - wither
      - hex
      - levitate
      - wind_burst
      - lightning
      - explosion
      - cold_snap
      - flare
      # 召喚系
      - summon_steed
      - summon_wolves
      - summon_undead
      - summon_vex
      - summon_decoy
      - animate
      # ユーティリティ系
      - pickup
      - craft
      - rune
      - place_block
      - phantom_block

      - firework
      - prestidigitation
      - rotate
      - speed_boost
    unlock-cost:
      level: 5
      materials:
        OAK_PRESSURE_PLATE: 2
        IRON_CHESTPLATE: 1

  underfoot:
