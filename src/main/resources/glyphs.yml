        AMETHYST_SHARD: 8

  wall:
    tier: 3
    mana-cost: 500
    # 加速:壁生成速度↑ | 減速:壁生成速度↓ | 分裂:壁の層数増加
    unlock-cost:
      level: 25
      materials:
        NETHER_STAR: 1
        OBSIDIAN: 8

  # ============================================================
  # Effects（効果）- Tier 1 (Novice)
  # ============================================================

  break:
    tier: 1
    mana-cost: 10
    # 増幅:ツールティア↑(0=木,1=石,2=鉄,3+=ダイヤ) | 減少:即壊しブロック(硬度0)のみ
    # 範囲:範囲破壊 | 抽出:シルクタッチ | 幸運:ドロップ増
    max-augments:
      amplify: 3  # ※3超は効果なし（ダイヤが最高ティア）
      aoe: 5
      fortune: 3
      extract: 1  # ※ON/OFFのみ（シルクタッチは2段階以上なし）
