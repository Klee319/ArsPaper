# グリフ設定ファイル
# 各グリフのティア、マナコスト、解放コスト、上限を定義
# 本家Ars Nouveauのソースコード準拠
#
# tier: スペルブックのティア制限（1=Novice, 2=Apprentice, 3=Archmage）
# mana-cost: スペル発動時のマナ消費量
# max-augments: 各増強の最大スタック数（未設定=無制限、サーバー管理者が引き上げ可能）
# params: エフェクト固有の数値パラメータ（ダメージ量、持続時間等の係数調整用）
# ※ 増強の互換性はソースコード定義（GlyphConfig.AUGMENT_COMPAT）
# unlock-cost:
#   level: 必要経験値レベル
#   materials: 必要素材（素材名: 個数）
#
# ===== 増強カテゴリ一覧 =====
# amplify    (増幅)     : 効果の強度・威力を上昇させる
# dampen     (減少)     : 効果の強度・威力を低下させる
# aoe        (幅)         : 左右に範囲を広げる
# aoe_height (上下)       : 上下に範囲を広げる
# aoe_vertical(範囲[全長]): 面に垂直な方向に2ブロック延長
# aoe_radius (半径増加)  : 爆発威力・召喚数・拾い範囲等を拡大する
# extend_time(延長)     : 持続時間を延長する
# duration_down(短縮)   : 持続時間を短縮する
# accelerate (加速)     : 速度を上昇させる（投擲・軌道用）
# decelerate (減速)     : 速度を低下させる（投擲・軌道用）
# pierce     (貫通)     : 投擲が対象を貫通する
# split      (分裂)     : 投擲が複数に分裂する
# extract    (抽出)     : シルクタッチ効果を付与する（幸運と排他）
# fortune    (幸運)     : ドロップ量を増加させる（抽出と排他）
# randomize  (無作為)   : 効果にランダム性を付与する
# rapid_fire (連射)     : スペルのCTを半減する（全形態互換、複数積み可、照射は2個内蔵）
# --- 以下は汎用増強（全エフェクトに使用可能）---
# delay      (遅延)     : 後続効果の発動を遅延させる（複数積みで遅延時間加算）
# --- 以下は限定互換増強 ---
# linger     (残留)     : 命中範囲に効果を持続的に再発動するエリアを生成
#                          ルーン+残留で発動後も効果が残る
# propagate  (伝播)     : 投射/接触互換。ブロック着弾時に周辺エンティティにも効果を伝播

glyphs:

  # ============================================================
  # Forms（形態）- スペルの発動方法を決定する
  # ============================================================

  # 説明: 弾を発射し着弾地点に効果を適用する
  projectile:
    tier: 1
    mana-cost: 10
    # 加速:弾速↑ | 減速:弾速↓ | 貫通:対象を貫通 | 分裂:弾が複数化
    # 軌跡:飛行経路上にも効果 | 延伸:射程延長
    params:
      max-trail-ticks: 200          # 弾の最大飛行時間(tick)
      spread-angle-step: 0.15       # 分裂時の弾の拡散角度(rad)
    max-augments:
      accelerate: 6
      decelerate: 6
      pierce: 4
      split: 4
      rapid_fire: 4
      trace: 1
    unlock-cost:
      level: 5
      materials:
        ARROW: 16
        LAPIS_BLOCK: 1

  # 説明: 近接距離の対象に直接効果を適用する
  touch:
    tier: 1
    mana-cost: 10
    # effects空=全効果互換（投擲のみコード側で除外）
    max-augments:
      rapid_fire: 4
    params:
      range: 5.0                    # 接触判定距離(ブロック)
    unlock-cost:
      level: 5
      materials:
        OAK_BUTTON: 4
        LAPIS_BLOCK: 1

  # 説明: 自分自身に効果を適用する
  self:
    tier: 1
    mana-cost: 10
    max-augments:
      rapid_fire: 4
    unlock-cost:
      level: 5
      materials:
        IRON_CHESTPLATE: 1
        LAPIS_BLOCK: 1

  # 説明: 足元のブロックに効果を適用する
  underfoot:
    tier: 1
    mana-cost: 10
    max-augments:
      rapid_fire: 4
    unlock-cost:
      level: 5
      materials:
        IRON_BOOTS: 1
        LAPIS_BLOCK: 1

  # 説明: 頭上のブロックに効果を適用する（足元の上方向版）
  overhead:
    tier: 1
    mana-cost: 5
    max-augments:
      rapid_fire: 4
    unlock-cost:
      level: 5
      materials:
        IRON_HELMET: 1
        LAPIS_BLOCK: 1

  # 説明: 自身の周囲を回転する球体が接触した対象に効果を適用する
  orbit:
    tier: 2
    mana-cost: 80
    # 加速:回転速度↑ | 減速:回転速度↓ | 分裂:軌道数増加
    # 延長:旋回持続+3秒/段 | 短縮:旋回持続-3秒/段 | 半径増加:軌道半径↑
    params:
      orbit-radius: 2.0             # 旋回半径(ブロック)
      radius-per-aoe: 1.0           # 半径増加1段あたりの旋回半径増加(ブロック)
      base-orbs: 2                  # 基本軌道数(分裂で加算)
      max-orbs: 6                   # 最大軌道数
      base-duration-ticks: 160      # 基本旋回時間(tick=8秒)
      extend-duration-bonus: 40     # 延長1段あたりの追加時間(tick=2秒)
      hit-cooldown-ticks: 20        # 同一対象への再ヒット間隔(tick)
    max-augments:
      accelerate: 6
      decelerate: 6
      split: 4
      extend_time: 6
      duration_down: 3
      rapid_fire: 4
      aoe_radius: 6
    unlock-cost:
      level: 20
      materials:
        ENDER_EYE: 16
        COMPASS: 1

  # 説明: 時限式の火球を発射し、炸裂地点に効果を適用する
  burst:
    tier: 2
    mana-cost: 70
    # 延伸:弾速UP=遠くで炸裂(距離ベース) | 延長:信管延長=遅く炸裂(時間ベース)
    # 半径増加:炸裂範囲↑ | 貫通:エンティティ貫通 | 分裂:複数弾
    # 空中炸裂でもブロック対象を取れる
    params:
      base-speed: 1.0               # 基本弾速
      reach-speed-bonus: 0.25        # 延伸1段あたりの弾速増加
      base-fuse-ticks: 20           # 基本信管時間(tick=1秒)
      fuse-per-duration-level: 20   # 延長1段あたりの信管延長(tick=1秒)
      base-burst-radius: 1.0        # 基本炸裂半径(ブロック)
      radius-per-aoe: 1.0          # 半径増加1段あたりの炸裂半径増加(ブロック)
      
    max-augments:
      pierce: 4
      split: 4
      aoe_radius: 6
      extend_reach: 6
      shrink_reach: 3
      extend_time: 6
      duration_down: 1
    unlock-cost:
      level: 25
      materials:
        TNT: 16
        ENDER_EYE: 8

  # 説明: 直線レーザーを照射し経路上の全対象に効果を適用する（デフォルト全貫通）
  beam:
    tier: 3
    mana-cost: 110
    # エンティティ全貫通 | 加速:射程↑ | 減速:射程↓ | 分裂:複数ビーム
    # 半径増加:ビームが太くなる（範囲内全エンティティ対象）
    # 貫通:ソリッドブロックを貫通（1*pierce個） | 軌跡:軌道上のブロックにも効果 | 延伸:射程延長
    params:
      base-range: 25.0              # 基本射程(ブロック)
      range-per-reach: 5.0         # 延伸1段あたりの射程増加(ブロック)
      spread-angle-step: 0.12       # 分裂時のビーム拡散角度(rad)
      radius-per-aoe: 1.0           # 半径増加1段あたりのビーム太さ増加(ブロック)
    max-augments:
      split: 4
      aoe_radius: 4
      rapid_fire: 2
      extend_reach: 6
      shrink_reach: 4
      pierce: 4
      trace: 1
    unlock-cost:
      level: 40
      materials:
        BEACON: 1
        DRAGON_BREATH: 4
        SEA_LANTERN: 16
  


  # ============================================================
  # Effects（効果）- Tier 1 (Novice)
  # ============================================================

  # 説明: ブロックを破壊する。増幅でツールティア上昇
  break:
    tier: 1
    mana-cost: 20
    # 増幅:ツールティア上昇(0=石, 1=鉄, 2=ダイヤ, 3=ネザライト) + 破壊可能硬度上昇
    # 減衰1:掘削モード(シャベル適正ブロックのみ破壊)
    # 減衰2:ユーティリティモード(道/樹皮剥ぎ/さび落とし/さび止め落とし/苔落とし)
    # 範囲:範囲破壊 | 抽出:シルクタッチ | 幸運:ドロップ増
    max-augments:
      amplify: 3  # 0=石(硬度25), 1=鉄(硬度50), 2=ダイヤ(硬度75,黒曜石可), 3=ネザライト(硬度100)
      dampen: 2   # 1=掘削モード, 2=ユーティリティモード
      aoe: 7
      fortune: 3
      extract: 1  # ※ON/OFFのみ（シルクタッチは2段階以上なし）
    params:
      max-hardness: 25.0  # 基礎破壊可能硬度上限
      hardness-per-amplify: 25.0  # 増幅1段ごとの硬度上限増加
    unlock-cost:
      level: 15
      materials:
        GOLDEN_PICKAXE: 1
        IRON_PICKAXE: 1
        STONE_PICKAXE: 1

  # 説明: 対象にダメージを与え毒を付与する
  harm:
    tier: 1
    mana-cost: 20
    # 増幅:ダメージ↑(+2.0HP/段)
    # 延長:毒の持続延長(+3秒/段) | 短縮:毒の持続短縮
    max-augments:
      amplify: 6
      dampen: 2   # 2個でamp-1(=2.0HP), 4個でamp-2(=0に近い)。これ以上積んでも変化なし
      extend_time: 8
      duration_down: 2
      linger: 6
      propagate: 4
    params:
      base-damage: 9.0              # 基本ダメージ(HP)
      amplify-bonus: 3.0            # 増幅1段あたりのダメージ増加(HP)
      base-poison-seconds: 6        # 基本毒持続(秒)
      poison-seconds-per-duration: 2 # 延長1段あたりの毒持続増加(秒)
    unlock-cost:
      level: 15
      materials:
        STONE_SWORD: 1
        IRON_SWORD: 1
        GOLDEN_SWORD: 1

  # 説明: 対象を炎上させカスタム火炎ダメージを与える（火炎耐性有効）
  ignite:
    tier: 2
    mana-cost: 25
    # 増幅:火炎ダメージ↑(+0.5HP/段)| 半径増加:範囲着火
    # 延長:炎上持続延長(+20tick/段) | 短縮:持続短縮
    # 火炎耐性が有効（DamageType.ON_FIRE使用）
    max-augments:
      amplify: 6
      dampen: 1   
      extend_time: 6
      duration_down: 3
      linger: 6
      propagate: 4

    params:
      base-fire-ticks: 80 #(tick=3秒、基本炎上持続)
      duration-bonus-ticks: 20 #(tick/段、延長1段あたり+1秒)
      base-damage: 1.0 #(HP、1回あたりの火炎ダメージ)
      amplify-damage-bonus: 0.5 #(HP/段、増幅1段あたり+0.5HP)
      damage-interval: 20 #(tick=1秒、ダメージ間隔)

    unlock-cost:
      level: 20
      materials:
        FLINT: 16
        FIRE_CHARGE: 4

  # 説明: 対象を凍結させ移動を阻害する
  freeze:
    tier: 2
    mana-cost: 25
    # 増幅:凍結強度↑
    # 延長:凍結持続延長 | 短縮:凍結持続短縮
    max-augments:
      amplify: 6
      dampen: 2
      extend_time: 6
      duration_down: 2
      linger: 6
      propagate: 4
    params:
      base-duration: 120             # 基本凍結持続(tick=6秒)
      duration-per-level: 40        # 延長1段あたりの持続増加(tick=2秒)
      base-slowness-level: 0
      # amplify: 鈍足レベル上昇(per-stackはamplifyグリフのparams参照)
    unlock-cost:
      level: 20
      materials:
        ICE: 16
        POWDER_SNOW_BUCKET: 1

  # 説明: 対象を吹き飛ばす（自己:視線の反対方向）
  knockback:
    tier: 2
    mana-cost: 25
    # 増幅:吹き飛ばし力↑(+1.0/段)
    max-augments:
      amplify: 6
      dampen: 1   
      linger: 6
      propagate: 4
    params:
      base-force: 1.5               # 基本吹き飛ばし力
      amplify-bonus: 1.0            # 増幅1段あたりの力増加
      max-force: 7.5                # 吹き飛ばし力上限
      base-block-radius: 2.0                   # ブロック着弾時の基本効果範囲(ブロック)
    unlock-cost:
      level: 20
      materials:
        PISTON: 16
        WIND_CHARGE: 4

  # 説明: 対象を術者方向に引き寄せる
  # 説明: 対象の位置に吸引エリアを生成し周囲を引き寄せる（突風の逆）
  # 対象がエンティティの場合、対象自身は影響を受けない
  pull:
    tier: 2
    mana-cost: 25
    # 増幅:吸引力↑| 半径増加:吸引範囲拡大 | 延長/短縮:効果時間
    max-augments:
      amplify: 6
      dampen: 1
      aoe_radius: 6
      extend_time: 6
      duration_down: 2
    params:
      base-radius: 3.0              # 吸引範囲半径(ブロック)
      radius-per-aoe: 1.0           # 半径増加1段あたりの吸引範囲増加(ブロック)
      base-force: 0.6               # 基本吸引力
      amplify-force-bonus: 0.3      # 増幅1段あたりの吸引力増加
      base-duration: 120  # tick=6秒、基本持続
      duration-per-level: 40  # tick=2秒/段、延長あたり加算
    unlock-cost:
      level: 20
      materials:
        FISHING_ROD: 1
        SLIME_BLOCK: 4

  # 説明: 対象に重力効果を付与し押し下げる
  gravity:
    tier: 2
    mana-cost: 25
    # 増幅:重力効果↑
    # 延長:持続延長 | 短縮:持続短縮
    max-augments:
      amplify: 6
      dampen: 2
      extend_time: 6
      duration_down: 1
      linger: 6
      propagate: 4
    params:
      base-push-down: 0.5  # 重力の基本強度
      amplify-push-bonus: 0.25  # /段、増幅あたり加算
      gravity-duration-base-ticks: 80  # tick=4秒、基本持続
      gravity-duration-per-level-ticks: 40  # tick=2秒/段、延長あたり加算
    unlock-cost:
      level: 20
      materials:
        ANVIL: 1
        SAND: 32

  # 説明: ブロック→松明設置（壁対応）、エンティティ→暗視+発光付与
  light:
    tier: 1
    mana-cost: 15
    # 範囲:範囲設置
    # 延長:暗視持続延長 | 短縮:暗視持続短縮
    # ブロック→松明設置 | エンティティ→暗視+発光付与
    max-augments:
      aoe: 7
      extend_time: 6
      duration_down: 2
    params:
      base-duration-ticks: 600      # 基本持続(tick=30秒)
      duration-per-level: 200      # 延長1段あたりの持続増加(tick=10秒)
    unlock-cost:
      level: 10
      materials:
        LANTERN: 4
        TORCH: 16

  # 説明: 成熟した作物を収穫する。増幅で植え直し確率上昇（正方形範囲）
  harvest:
    tier: 1
    mana-cost: 15
    # 増幅:植え直し確率(1=33%,2=66%,3=100%)
    # 半径増加:範囲収穫 | 幸運:ドロップ増 | 抽出:シルクタッチ
    # 耕地化・花/雑草の破壊にも対応
    max-augments:
      amplify: 3
      aoe_radius: 7
      fortune: 3
      extract: 1  # ※ON/OFFのみ
    params:
      base-radius: 0                   # 基本収穫範囲(ブロック)
    unlock-cost:
      level: 10
      materials:
        IRON_HOE: 1
        GOLDEN_HOE: 1
        STONE_HOE: 1

  # 説明: 草・つる・羊毛等を刈り取る
  cut:
    tier: 1
    mana-cost: 15
    # 範囲:範囲カット
    max-augments:
      aoe: 7
    unlock-cost:
      level: 10
      materials:
        SHEARS: 1
        OAK_LEAVES: 16

  # 説明: 対象ブロックに遠隔で右クリック操作を行う（全ブロック対応）
  interact:
    tier: 1
    mana-cost: 10
    # 範囲:範囲操作
    # 遠隔で右クリック操作（ドア開閉・ボタン押下・レバー操作）
    max-augments:
      aoe: 7
    unlock-cost:
      level: 10
      materials:
        LEVER: 4
        STONE_BUTTON: 4

  # 説明: 周囲のドロップアイテムを拾い術者に渡す
  pickup:
    tier: 1
    mana-cost: 20
    # 半径増加:拾得範囲拡大
    max-augments:
      aoe_radius: 7
    params:
      base-radius: 2.0  # 球体、基本拾得範囲
    unlock-cost:
      level: 15
      materials:
        HOPPER: 4
        CHEST: 4

  # 説明: ブロックの向きを回転させる
  rotate:
    tier: 2
    mana-cost: 25
    # 増幅:回転角度↑| 半径増加:範囲回転
    # 延長:継続回転 | 短縮:回転短縮
    max-augments:
      amplify: 3
      dampen: 2   # 2個でamp-1(=逆回転90°)。方向反転のみなのでこれ以上不要
      aoe_radius: 6
      extend_time: 6
      duration_down: 1
    params:
      base-lock-ticks: 80  # tick=4秒、操作ロック時間
      lock-bonus-ticks: 40  # tick=2秒/段、延長あたり加算
    unlock-cost:
      level: 20
      materials:
        COMPASS: 4
        REDSTONE_BLOCK: 4

  # 説明: 木を一括伐採する
  fell:
    tier: 1
    mana-cost: 20
    # 半径増加:伐採範囲拡大
    max-augments:
      aoe_radius: 6
    params:
      base-max-blocks: 25  # デフォルト伐採ブロック数
      aoe-bonus-blocks: 25  # /段、半径増加あたり加算
    unlock-cost:
      level: 15
      materials:
        IRON_AXE: 1
        GOLDEN_AXE: 1
        STONE_AXE: 1

  # 説明: 一時的なガラスブロックを設置する。増幅で永続化
  phantom_block:
    tier: 1
    mana-cost: 15
    # 増幅:永続ブロック化(一時でなくなる、ON/OFF)| 範囲:範囲設置
    # 延長:一時ブロック持続延長 | 短縮:持続短縮
    # 破壊時ドロップなし
    max-augments:
      amplify: 1
      aoe: 7
      extend_time: 6
      duration_down: 1
    params:
      base-removal-ticks: 200  # tick=10秒、一時ブロック消滅までの時間
      duration-bonus-ticks: 100  # tick=5秒/段、延長あたり加算
    unlock-cost:
      level: 15
      materials:
        GLASS: 16
        WHITE_WOOL: 8
        

  # 説明: 手持ちのブロックを遠隔設置する
  place_block:
    tier: 1
    mana-cost: 15
    # 範囲:範囲設置
    # オフハンドまたはホットバー右側のブロックを設置
    max-augments:
      aoe: 7
    unlock-cost:
      level: 15
      materials:
        DISPENSER: 4
        COBBLESTONE: 64


  # 説明: エンティティを上方に打ち上げる。ブロック対象はFallingBlock化
  launch:
    tier: 2
    mana-cost: 25
    # 増幅:打ち上げ力↑(+0.8/段)| 半径増加:AOE打ち上げ範囲
    max-augments:
      amplify: 6
