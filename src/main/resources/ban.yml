# ============================================================
# ArsPaper スペルBAN設定
# ============================================================
# サーバ全体でBANするスペル（効果グリフ）のリスト。
# ここに記載されたスペルは全ワールドで使用不可になります。
# グリフIDは arspaper:<key> の形式で記載してください。
#
# 例:
# banned-spells:
#   - "arspaper:blink"
#   - "arspaper:lightning"
#
# ワールド別のBAN設定は /ars world ban コマンドで設定できます。
# ============================================================

banned-spells: []
