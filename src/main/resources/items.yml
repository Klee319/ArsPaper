      core-item: FURNACE
      pedestal-items:
        - "NETHERRACK x2"
        - "MAGMA_BLOCK x2"
        - "BLAZE_POWDER x2"
        - "custom:source_gem"
      source: 300
      result: "custom:volcanic_sourcelink"

  # ----------------------------------------------------------
