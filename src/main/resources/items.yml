# ============================================================
# items.yml - アイテムレシピ & 儀式エフェクト定義
# ============================================================
# items:          アイテムを生成するレシピ（作業台 or 儀式）
# ritual_effects: ワールドエフェクト儀式（アイテム結果なし）
#
# レシピ記法:
#   method: workbench  - 作業台クラフト (type, shape, ingredients, amount)
#   method: ritual     - 儀式クラフト (core-item, pedestal-items, source, result)
#
# custom: プレフィックスは本プラグインのカスタムアイテムを参照する。
# "x2" 等の記法はアイテム数量を示す。
# ============================================================

# ============================================================
# アイテムレシピ
# ============================================================
items:

  # ==========================================================
  # 作業台レシピ
  # ==========================================================

  # ----------------------------------------------------------
  # 見習いの魔法書
  # ----------------------------------------------------------
  spell_book_novice:
    recipe:
      method: workbench
      type: shaped
      shape:
        - " S "
        - "PBA"
        - " V "
      ingredients:
        S: IRON_SWORD
        P: IRON_PICKAXE
        B: BOOK
        A: IRON_AXE
        V: IRON_SHOVEL

  # ----------------------------------------------------------
  # ドミニオンワンド
  # ----------------------------------------------------------
  dominion_wand:
    recipe:
      method: workbench
      type: shaped
      shape:
        - "  G"
        - " S "
        - "S  "
      ingredients:
        G: GOLD_INGOT
        S: STICK

  # ----------------------------------------------------------
  # 刻印台
  # ----------------------------------------------------------
  scribing_table:
    recipe:
      method: workbench
      type: shaped
      shape:
        - "LGL"
        - " B "
        - " B "
      ingredients:
        L: LAPIS_LAZULI
        G: "custom:source_gem"
        B: BOOKSHELF

  # ----------------------------------------------------------
  # ソースジャー
  # ----------------------------------------------------------
  source_jar:
    recipe:
      method: workbench
      type: shaped
      shape:
        - "GGG"
        - "GSG"
        - "GGG"
      ingredients:
        G: BRICK
        S: "custom:source_berry"

  # ----------------------------------------------------------
  # 台座 (x2)
  # ----------------------------------------------------------
  pedestal:
    recipe:
      method: workbench
      type: shaped
      shape:
        - " G "
        - " S "
        - "SSS"
      ingredients:
        G: GOLD_INGOT
        S: "custom:sourcestone"
      amount: 2

  # ----------------------------------------------------------
  # ソースジェムブロック (圧縮: gem×9 → block×1)
  # ----------------------------------------------------------
  source_gem_block:
    recipe:
      method: workbench
      type: shaped
      shape:
        - "GGG"
        - "GGG"
        - "GGG"
      ingredients:
        G: "custom:source_gem"

  # ----------------------------------------------------------
  # ソースジェムブロック展開 (展開: block×1 → gem×9)
  # ----------------------------------------------------------
  source_gem_from_block:
    recipe:
      method: workbench
      type: shapeless
      shape: []
      ingredients:
        B: "custom:source_gem_block"
      result: "custom:source_gem"
      amount: 9

  # ----------------------------------------------------------
  # ソースストーン (ソースベリー + 焼き石)
  # ----------------------------------------------------------
  sourcestone:
    recipe:
      method: workbench
      type: shapeless
      shape: []
      ingredients:
        A: "custom:source_berry"
        B: STONE
      result: "custom:sourcestone"

  # ==========================================================
  # 儀式レシピ - ソースジェムブロック（一括クラフト）
  # ==========================================================

  # ----------------------------------------------------------
  # ソースジェムブロック（一括儀式）
  # 7アメジストブロック(28シャード) + 2ラピスブロック(18ラピス) → ジェムブロック1個(=9ジェム)
  # 個別より少しお得な代わりにSource消費が多い
  # ----------------------------------------------------------
  source_gem_block_ritual:
    recipe:
      method: ritual
      core-item: AMETHYST_BLOCK
      pedestal-items:
        - "AMETHYST_BLOCK x6"
        - "LAPIS_BLOCK x2"
      source: 2500
      result: "custom:source_gem_block"

  # ==========================================================
  # 儀式レシピ - 中間素材（一括クラフト）
  # ==========================================================

  # ----------------------------------------------------------
  # マジックファイバー×3（一括儀式）
  # ----------------------------------------------------------
  magebloom_fiber_bulk:
    recipe:
      method: ritual
      core-item: STRING
      pedestal-items:
        - "STRING x2"
        - "WHEAT_SEEDS x3"
        - "custom:source_gem x3"
      source: 300
      result: "custom:magebloom_fiber"
      result-amount: 3

  # ----------------------------------------------------------
  # 空のスレッド×3（一括儀式）
  # ----------------------------------------------------------
  thread_empty_bulk:
    recipe:
      method: ritual
      core-item: WHITE_WOOL
      pedestal-items:
        - "WHITE_WOOL x2"
        - "custom:magebloom_fiber x3"
        - "custom:source_gem x3"
      source: 600
      result: "custom:thread_empty"
      result-amount: 3

  # ==========================================================
  # 儀式レシピ - スペルブック
  # ==========================================================

  # ----------------------------------------------------------
  # 魔術師の魔術書 (アップグレード)
  # ----------------------------------------------------------
  upgrade_spell_book_apprentice:
    recipe:
      method: ritual
      core-item: "custom:spell_book_novice"
      pedestal-items:
        - "DIAMOND_BLOCK x1"
        - "EMERALD_BLOCK x1"
        - "LAPIS_BLOCK x1"
        - "REDSTONE_BLOCK x1"
        - "GOLD_BLOCK x1"
        - "QUARTZ_BLOCK x1"
        - "BLAZE_ROD x1"
        - "custom:source_gem_block"
      source: 1000
      result: "custom:spell_book_apprentice"

  # ----------------------------------------------------------
  # 大魔導士の魔導書 (アップグレード)
  # ----------------------------------------------------------
  upgrade_spell_book_archmage:
    recipe:
      method: ritual
      core-item: "custom:spell_book_apprentice"
      pedestal-items:
        - "NETHER_STAR"
        - "NETHERITE_BLOCK"
        - "CRYING_OBSIDIAN"
        - "ECHO_SHARD"
        - "END_CRYSTAL"
        - "ENDER_EYE"
        - "TOTEM_OF_UNDYING"
        - "custom:source_gem_block"
      source: 5000
      result: "custom:spell_book_archmage"

  # ==========================================================
  # 儀式レシピ - ブロック・機械
  # ==========================================================

  # ----------------------------------------------------------
  # 儀式コア（作業台クラフト - 儀式なしで作成可能）
  # ----------------------------------------------------------
  ritual_core:
    recipe:
      method: workbench
